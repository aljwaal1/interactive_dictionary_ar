name: Build APK Direct

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove generated sample tests
        run: rm -rf test

      - name: Flutter pub get
        run: flutter pub get

      - name: Set Android package and minSdk
        run: |
          APP_GRADLE="android/app/build.gradle"
          APP_GRADLE_KTS="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE_KTS" ]; then
            sed -i 's/applicationId = "[^"]*"/applicationId = "com.explapp.interactivedictionary"/g' "$APP_GRADLE_KTS"
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 23/g' "$APP_GRADLE_KTS"
          fi
          if [ -f "$APP_GRADLE" ]; then
            sed -i 's/applicationId "[^"]*"/applicationId "com.explapp.interactivedictionary"/g' "$APP_GRADLE"
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 23/g' "$APP_GRADLE"
          fi

      - name: Simple AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="قاموس تفاعلي" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK direct
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/interactive-dictionary.apk

      - name: Update DOWNLOAD_APK.md
        run: |
          REPO_FULL="${GITHUB_REPOSITORY}"
          cat > DOWNLOAD_APK.md <<EOF
          # تحميل التطبيق

          رابط APK المباشر:

          https://github.com/$REPO_FULL/raw/main/apk/interactive-dictionary.apk

          مسار الملف داخل المستودع:

          `apk/interactive-dictionary.apk`
          EOF

      - name: Commit APK and download file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/interactive-dictionary.apk DOWNLOAD_APK.md
          git commit -m "Build APK direct" || echo "No changes to commit"
          git push
